<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método Connect | Dashboard Estratégico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app" class="app-wrapper">
        <div class="app-container">
            <header class="wizard-header" id="wizardHeader">
                <div class="logo-area">
                    <h1>Método <span>Connect</span></h1>
                    <p>Guia de Estratégia Agro</p>
                </div>
                <div class="progress-container" id="progressBarContainer">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="steps-indicators">
                        <div class="step-dot active"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                    </div>
                </div>
            </header>

            <main id="wizardContent">
                <section id="currentStep" class="step-section active">
                    <!-- Steps injected here -->
                </section>
            </main>

            <nav class="wizard-nav" id="wizardNav">
                <button id="prevBtn" class="secondary-btn" disabled>Anterior</button>
                <button id="nextBtn" class="primary-btn">Próximo</button>
            </nav>

            <section class="saved-clients-dropdown" id="savedClientsContainer">
                <button class="toggle-clients-btn" id="toggleClients">Simulações Antigas</button>
                <div id="savedClientsList" class="clients-list-drawer hidden"></div>
            </section>

            <footer>
                <p>&copy; 2024 Agência Agro | Gerenciador de Tráfego</p>
            </footer>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="modal-overlay" onclick="window.closeVideo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="window.closeVideo()">&times;</span>
            <iframe id="videoPlayer" class="modal-iframe" allowfullscreen></iframe>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>

</html>
