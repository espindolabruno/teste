<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Campanha Agro | Método Connect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <h1>Método <span>Connect</span></h1>
                <p>Calculadora de Verba & Estratégia Agro</p>
            </div>
            <div class="budget-input-area">
                <div class="input-group">
                    <label for="clientName">Nome do Cliente</label>
                    <input type="text" id="clientName" placeholder="Ex: Fazenda Boa Vista">
                </div>
                <div class="input-group">
                    <label for="totalBudget">Orçamento Mensal (R$)</label>
                    <input type="number" id="totalBudget" placeholder="Ex: 5000" min="0">
                </div>
                <button id="saveBtn" class="primary-btn">Salvar Simulação</button>
            </div>
        </header>

        <section class="saved-clients-section">
            <h3>Simulações Salvas</h3>
            <div id="savedClientsList" class="clients-list">
                <!-- Saved clients will appear here -->
            </div>
        </section>

        <main id="appContent">
            <section class="results-grid" id="resultsGrid">
                <!-- Calculation cards will be injected here -->
            </section>

            <section class="details-section">
                <h2>Detalhamento da Estratégia</h2>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="audiences">Públicos Sugeridos</button>
                    <button class="tab-btn" data-tab="creatives">Base de Criativos</button>
                </div>
                <div class="tab-content" id="tabContent">
                    <!-- Tab content will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Agência Agro | Gerenciador de Tráfego</p>
        </footer>
    </div>
    <script src="app.js" type="module"></script>
</body>

</html>
